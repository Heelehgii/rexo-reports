<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>مقارنة التقارير — REXO</title>
<style>:root{
    --bg:#06111f;--panel:#101f35;--panel2:#142944;--line:#28415f;
    --text:#f7fbff;--muted:#91b7da;--cyan:#22d3ee;--purple:#8b5cf6;
    --green:#34d399;--red:#fb7185;--amber:#fbbf24;--track:#263b54;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;background:
      radial-gradient(circle at 90% 0,rgba(139,92,246,.18),transparent 30%),
      radial-gradient(circle at 0 15%,rgba(34,211,238,.12),transparent 28%),
      var(--bg);
    color:var(--text);font-family:Tahoma,Arial,sans-serif;direction:rtl;
    min-height:100vh
  }
  a{color:inherit;text-decoration:none}
  .viewer-wrap{width:min(1440px,calc(100% - 28px));margin:auto;padding:18px 0 34px}
  .viewer-header{
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:13px 0 18px
  }
  .viewer-brand{display:flex;align-items:center;gap:12px}
  .viewer-logo{
    min-width:94px;height:70px;border-radius:22px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--purple),var(--cyan));font-size:24px;
    font-weight:900;box-shadow:0 16px 38px rgba(139,92,246,.25)
  }
  .viewer-title h1{margin:0;font-size:28px}
  .viewer-title p{margin:5px 0 0;color:var(--muted);font-size:12px;line-height:1.7}
  .viewer-nav{display:flex;gap:8px;flex-wrap:wrap}
  .viewer-btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    padding:10px 14px;border:1px solid var(--line);border-radius:12px;
    background:rgba(255,255,255,.035);font-weight:800;font-size:12px
  }
  .viewer-btn.primary{background:linear-gradient(135deg,var(--purple),var(--cyan));border:0}
  .viewer-btn:hover{transform:translateY(-1px)}
  .viewer-hero{
    padding:23px;border:1px solid var(--line);border-radius:25px;
    background:linear-gradient(145deg,var(--panel2),var(--panel));
    box-shadow:0 20px 55px rgba(0,0,0,.24);margin-bottom:16px
  }
  .viewer-hero h2{margin:0;font-size:28px}
  .viewer-hero p{margin:7px 0 0;color:var(--muted);font-size:12px;line-height:1.9}
  .viewer-stats{
    display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0
  }
  .viewer-stat{
    border:1px solid var(--line);border-radius:18px;padding:15px;
    background:linear-gradient(145deg,var(--panel2),var(--panel))
  }
  .viewer-stat small{display:block;color:var(--muted);font-size:10px}
  .viewer-stat strong{
    display:block;margin-top:8px;font-size:22px;direction:ltr;text-align:right;
    font-variant-numeric:tabular-nums
  }
  .viewer-section-title{display:flex;justify-content:space-between;gap:12px;align-items:end;margin:22px 0 12px}
  .viewer-section-title h2{margin:0;font-size:24px}
  .viewer-section-title p{margin:4px 0 0;color:var(--muted);font-size:11px}
  .viewer-reports{display:grid;grid-template-columns:repeat(3,minmax(270px,1fr));gap:14px}
  .viewer-report-card{
    display:block;border:1px solid var(--line);border-radius:22px;padding:17px;
    background:linear-gradient(145deg,var(--panel2),var(--panel));
    box-shadow:0 14px 35px rgba(0,0,0,.16);transition:.18s ease;
    position:relative;overflow:hidden
  }
  .viewer-report-card::before{
    content:"";position:absolute;right:0;top:0;bottom:0;width:4px;
    background:linear-gradient(var(--purple),var(--cyan))
  }
  .viewer-report-card:hover{transform:translateY(-3px);border-color:rgba(34,211,238,.55)}
  .viewer-card-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .viewer-card-top h3{margin:0;font-size:18px}
  .viewer-period{color:var(--muted);font-size:10px;margin-top:6px}
  .viewer-badge{
    padding:5px 9px;border-radius:99px;border:1px solid rgba(34,211,238,.28);
    color:var(--cyan);font-size:9px;white-space:nowrap
  }
  .viewer-card-kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
  .viewer-card-kpi{border:1px solid var(--line);border-radius:12px;padding:9px;background:rgba(255,255,255,.025)}
  .viewer-card-kpi small{display:block;color:var(--muted);font-size:9px}
  .viewer-card-kpi strong{display:block;margin-top:5px;direction:ltr;text-align:right;font-size:15px}
  .viewer-open{
    margin-top:13px;border-top:1px solid var(--line);padding-top:11px;
    color:var(--cyan);font-weight:900;font-size:11px
  }
  .viewer-summary{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:16px}
  .viewer-summary .viewer-stat strong{font-size:20px}
  .viewer-product{
    border:1px solid var(--line);border-radius:24px;background:var(--panel);
    box-shadow:0 15px 40px rgba(0,0,0,.17);padding:17px;margin-bottom:16px
  }
  .viewer-product-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
  .viewer-product-head h2{margin:0;font-size:21px}
  .viewer-product-head p{margin:6px 0 0;color:var(--muted);font-size:11px}
  .viewer-product-grid{display:grid;grid-template-columns:minmax(300px,.9fr) minmax(500px,1.4fr);gap:15px}
  .viewer-media{
    min-height:390px;border:1px solid var(--line);border-radius:19px;
    background:#050a11;display:flex;align-items:center;justify-content:center;
    overflow:hidden;position:relative
  }
  .viewer-media video{
    display:block;width:100%;height:100%;max-height:620px;object-fit:contain
  }
  .viewer-media.viewer-image-media{
    min-height:0;
    height:auto;
    display:block;
    overflow:visible;
  }
  .viewer-media.viewer-image-media img{
    display:block;
    width:100%;
    height:auto;
    max-width:100%;
    max-height:none;
    object-fit:contain;
    object-position:center;
    margin:0 auto;
  }
  .viewer-media-empty{color:var(--muted);font-size:12px;text-align:center;padding:25px}
  .viewer-media-link{
    position:absolute;bottom:10px;left:10px;padding:7px 10px;border-radius:10px;
    background:rgba(5,12,25,.78);border:1px solid var(--line);font-size:10px
  }
  .viewer-gauges{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
  .viewer-gauge-card{
    border:1px solid var(--line);border-radius:18px;padding:13px;
    background:linear-gradient(145deg,var(--panel2),var(--panel));text-align:center
  }
  .viewer-gauge{
    --p:0;--g:var(--cyan);width:150px;height:150px;border-radius:50%;
    margin:auto;display:grid;place-items:center;
    background:conic-gradient(var(--g) calc(var(--p)*1%),var(--track) 0)
  }
  .viewer-gauge::before{
    content:"";position:absolute;width:122px;height:122px;border-radius:50%;
    background:var(--panel);border:1px solid var(--line)
  }
  .viewer-gauge{position:relative}
  .viewer-gauge-inner{position:relative;z-index:1;width:108px}
  .viewer-gauge-inner small{display:block;color:var(--muted);font-size:10px}
  .viewer-gauge-inner strong{display:block;margin-top:7px;font-size:20px;direction:ltr}
  .viewer-gauge-inner span{display:block;margin-top:4px;color:var(--muted);font-size:9px}
  .viewer-gauge-percent{margin-top:8px;color:var(--muted);font-size:10px}
  .viewer-notes{
    margin-top:13px;padding:13px;border:1px solid var(--line);border-radius:14px;
    color:var(--muted);font-size:11px;line-height:1.8;white-space:pre-wrap
  }
  .viewer-compare-controls{
    display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:16px
  }
  .viewer-compare-controls select{
    min-width:230px;padding:11px;border-radius:12px;border:1px solid var(--line);
    background:var(--panel2);color:var(--text);font:inherit
  }
  .viewer-compare-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:11px}
  .viewer-compare-card{
    border:1px solid var(--line);border-radius:18px;padding:14px;background:var(--panel)
  }
  .viewer-compare-card>small{color:var(--muted);font-size:10px}
  .viewer-pair{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:11px}
  .viewer-pair div{border:1px solid var(--line);border-radius:11px;padding:9px;background:rgba(255,255,255,.025)}
  .viewer-pair small{display:block;color:var(--muted);font-size:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .viewer-pair strong{display:block;margin-top:5px;direction:ltr;font-size:14px}
  .viewer-delta{margin-top:10px;text-align:center;font-size:10px;direction:ltr;color:var(--muted)}
  .viewer-delta.pos{color:var(--green)}.viewer-delta.neg{color:var(--red)}
  .viewer-footer{text-align:center;color:var(--muted);font-size:10px;margin-top:24px;padding:15px}
  @media(max-width:1100px){
    .viewer-reports{grid-template-columns:repeat(2,1fr)}
    .viewer-summary{grid-template-columns:repeat(3,1fr)}
    .viewer-compare-grid{grid-template-columns:repeat(2,1fr)}
    .viewer-product-grid{grid-template-columns:1fr}
  }
  @media(max-width:680px){
    .viewer-wrap{width:min(100% - 18px,1440px)}
    .viewer-header{align-items:flex-start;flex-direction:column}
    .viewer-reports,.viewer-stats,.viewer-summary,.viewer-compare-grid{grid-template-columns:1fr}
    .viewer-card-kpis,.viewer-gauges{grid-template-columns:1fr}
    .viewer-media{min-height:260px}
    .viewer-media.viewer-image-media{min-height:0}
    .viewer-title h1,.viewer-hero h2{font-size:23px}
    .viewer-compare-controls select{width:100%;min-width:0}
  }
  @media print{
    *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
    body{background:var(--bg)!important}
    .viewer-nav,.viewer-media-link{display:none!important}
    .viewer-product{break-inside:avoid}
  }</style>
</head>
<body>
<div class="viewer-wrap">
  <header class="viewer-header">
    <div class="viewer-brand">
      <div class="viewer-logo">REXO</div>
      <div class="viewer-title">
        <h1>مقارنة التقارير</h1>
        <p>اختر أي فترتين للمقارنة</p>
      </div>
    </div>
    <nav class="viewer-nav"><a class="viewer-btn" href="index.html">الرئيسية</a><button class="viewer-btn" onclick="window.print()">حفظ PDF</button></nav>
  </header>
  <section class="viewer-hero">
    <h2>مقارنة التقارير</h2>
    <p>اختر أي تقريرين للمقارنة. هذه الصفحة للقراءة فقط.</p>
  </section>
  <div class="viewer-compare-controls">
    <select id="compareA"><option value="0">تقرير شهر يوليو 2026 — من 1 يوليو 2026 إلى 31 يوليو 2026</option></select>
    <select id="compareB"><option value="0">تقرير شهر يوليو 2026 — من 1 يوليو 2026 إلى 31 يوليو 2026</option></select>
    <select id="compareCurrency"><option value="SAR">SAR</option><option value="USD">USD</option></select>
  </div>
  <section class="viewer-compare-grid" id="compareResult"></section>
  <footer class="viewer-footer">REXO • نسخة تصفح فقط • لا توجد أدوات تعديل</footer>
</div>
<script>const reports=[{"id":"r_mrw1251p_9tp8gd","name":"تقرير شهر يوليو 2026","periodStart":"2026-07-01","periodEnd":"2026-07-31","currency":"SAR","rate":3.75,"campaign":{"spendUsd":1982.88,"salesCount":450,"clicks":23000,"salesValueUsd":4054.0186666666664},"products":[{"id":"p_mrw1251p_y9wo39","name":"المنتج 1","campaign":"اسفنجه التنظيف السحريه","spendUsd":6,"salesCount":1,"clicks":33,"salesValueUsd":31.264,"notes":""},{"id":"p_mrw3hcng_fd7cqs","name":"المنتج 2","campaign":"عرض وفرها بالملي","spendUsd":2.2293333333333334,"salesCount":1,"clicks":11,"salesValueUsd":11.586666666666668,"notes":""}],"createdAt":1784721430285,"updatedAt":1784741595235}];
  const numberFormat=(value,decimals=0)=>new Intl.NumberFormat('en-US',{
    minimumFractionDigits:decimals,maximumFractionDigits:decimals
  }).format(Number(value)||0);
  const amount=(report,usd,currency)=>currency==='SAR'
    ?(Number(usd)||0)*(Number(report.rate)||3.75)
    :(Number(usd)||0);
  const roas=report=>{
    const spend=Number(report.campaign?.spendUsd)||0;
    return spend>0?(Number(report.campaign?.salesValueUsd)||0)/spend:0;
  };
  const metrics=(report,currency)=>({
    spend:amount(report,report.campaign?.spendUsd,currency),
    sales:Number(report.campaign?.salesCount)||0,
    clicks:Number(report.campaign?.clicks)||0,
    roas:roas(report),
    value:amount(report,report.campaign?.salesValueUsd,currency)
  });
  function renderComparison(){
    const aIndex=Number(document.getElementById('compareA').value)||0;
    let bIndex=Number(document.getElementById('compareB').value)||0;
    const currency=document.getElementById('compareCurrency').value;
    const reportA=reports[aIndex]||reports[0];
    const reportB=reports[bIndex]||reports[0];
    if(!reportA||!reportB)return;
    const a=metrics(reportA,currency),b=metrics(reportB,currency);
    const defs=[
      ['spend','المبلغ المنفق',2,currency],
      ['sales','عدد المبيعات',0,'Sales'],
      ['clicks','النقرات',0,'Clicks'],
      ['roas','ROAS',2,'ROAS'],
      ['value','قيمة المبيعات',2,currency]
    ];
    document.getElementById('compareResult').innerHTML=defs.map(([key,label,decimals,unit])=>{
      const av=Number(a[key])||0,bv=Number(b[key])||0,diff=bv-av;
      const pct=av!==0?(diff/Math.abs(av))*100:null;
      const cls=diff>0?'pos':diff<0?'neg':'';
      const delta=(diff>0?'+':'')+numberFormat(diff,decimals)
        +(pct===null?'':' ('+(pct>0?'+':'')+numberFormat(pct,1)+'%)');
      return '<article class="viewer-compare-card">'
        +'<small>'+label+'</small>'
        +'<div class="viewer-pair">'
        +'<div><small>'+reportA.name+'</small><strong>'+numberFormat(av,decimals)+'</strong></div>'
        +'<div><small>'+reportB.name+'</small><strong>'+numberFormat(bv,decimals)+'</strong></div>'
        +'</div><div class="viewer-delta '+cls+'">الفرق: '+delta+' '+unit+'</div></article>';
    }).join('');
  }
  document.getElementById('compareA').addEventListener('change',renderComparison);
  document.getElementById('compareB').addEventListener('change',renderComparison);
  document.getElementById('compareCurrency').addEventListener('change',renderComparison);
  if(reports.length>1)document.getElementById('compareB').value='1';
  renderComparison();</script>
</body>
</html>
